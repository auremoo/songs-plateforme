# fly.toml app configuration file generated for margot-portfolio on 2026-03-10T13:33:13+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'margot-portfolio'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "portfolio_data"
  destination = "/app/persistent"

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
  count = 1
